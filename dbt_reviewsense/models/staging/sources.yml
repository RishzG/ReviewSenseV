version: 2

sources:
  - name: raw
    database: REVIEWSENSE_DB
    schema: RAW
    tables:
      - name: REVIEWS_RAW_V2
        description: >
          Multi-category review source. VARIANT column with SOURCE_CATEGORY discriminator.
          Contains Electronics (183K) + any additional categories loaded via ingest_category.py.
        columns:
          - name: V
            description: Raw JSON review data as VARIANT
          - name: SOURCE_CATEGORY
            description: Dataset category (e.g., Electronics, Cell_Phones)
          - name: SOURCE_FILE
            description: Original filename from COPY INTO
          - name: LOADED_AT
            description: Timestamp when row was ingested

  - name: curated
    database: REVIEWSENSE_DB
    schema: CURATED
    tables:
      - name: PRODUCT_METADATA
        description: >
          McAuley Electronics metadata. 786K products with title, brand, price,
          features, category. 25K ASINs overlap with review dataset.
        columns:
          - name: ASIN
          - name: TITLE
          - name: BRAND
          - name: PRICE
          - name: FEATURES_TEXT
          - name: CATEGORY_PATH
          - name: ALSO_BUY

  # Legacy source — kept for reference/backward compatibility
  - name: analytics
    database: REVIEWSENSE_DB
    schema: ANALYTICS
    tables:
      - name: REVIEWS_FOR_GENAI
        description: >
          LEGACY: Original Electronics-only source (183K rows).
          Created by teammate (Jiwei). Kept for backward compatibility.
          New pipeline uses RAW.REVIEWS_RAW_V2.
